<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#08060f"/>

  <!-- Ambient glow behind baton -->
  <ellipse cx="260" cy="260" rx="160" ry="160" fill="#00d4f0" opacity="0.06"/>

  <!-- Gradient for baton -->
  <defs>
    <linearGradient id="batonGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4f0"/>
      <stop offset="100%" stop-color="#e040fb"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Baton shaft -->
  <line x1="128" y1="392" x2="388" y2="132"
        stroke="url(#batonGrad)" stroke-width="26" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Baton tip orb (pink) -->
  <circle cx="388" cy="132" r="24" fill="#e040fb" filter="url(#glow)"/>
  <circle cx="388" cy="132" r="12" fill="#fff" opacity="0.9"/>

  <!-- Baton handle cap (cyan) -->
  <circle cx="132" cy="388" r="16" fill="#00d4f0" opacity="0.85"/>

  <!-- Sparkle dots -->
  <circle cx="310" cy="195" r="7" fill="#00d4f0" opacity="0.55"/>
  <circle cx="200" cy="310" r="5" fill="#e040fb" opacity="0.45"/>
  <circle cx="348" cy="300" r="4" fill="#00d4f0" opacity="0.35"/>
  <circle cx="170" cy="218" r="4" fill="#e040fb" opacity="0.3"/>
  <circle cx="255" cy="155" r="3" fill="#00d4f0" opacity="0.4"/>
</svg>
